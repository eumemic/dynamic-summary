name: Baseline Benchmarks

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read  # Only need read access now (no more commits)

jobs:
  benchmark:
    name: Generate Baseline Benchmarks
    runs-on: ubuntu-latest
    
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
    
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ragzoom_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml', 'requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements-dev.txt
      
      - name: Initialize PostgreSQL vector extension
        run: |
          # Wait for PostgreSQL to be ready
          until pg_isready -h localhost -p 5432 -U postgres; do
            echo "Waiting for PostgreSQL..."
            sleep 1
          done
          
          # Create vector extension
          PGPASSWORD=postgres psql -h localhost -p 5432 -U postgres -d ragzoom_test -c "CREATE EXTENSION IF NOT EXISTS vector;"
      
      - name: Run benchmarks
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          mkdir -p benchmark_results
          
          # Run indexing benchmark with current defaults and full Hobbit text
          echo "Running indexing benchmark with full Hobbit text and current defaults..."
          ./scripts/run-indexing-benchmarks \
            --database "postgresql+psycopg://postgres:postgres@localhost:5432/ragzoom_test" \
            --output-dir benchmark_results \
            test_data/the_hobbit.txt
          
          # Run query benchmarks (same configurations as PR tests)
          echo "Running query performance benchmarks..."
          for config in "specific-2000-10" "broad-2000-10" "complex-2000-10"; do
            echo "Running query benchmark with config=$config"
            pytest tests/benchmarks/test_query_performance.py::test_query_performance -k "$config" -v
          done
          
          # Store baseline in S3
          TIMESTAMP=$(date -u +%Y-%m-%d-%H%M%S)
          SHORT_COMMIT=$(echo "${{ github.sha }}" | cut -c1-7)
          BASELINE_NAME="telemetry-${TIMESTAMP}-${SHORT_COMMIT}.json"
          
          echo "📤 Uploading baseline to S3: $BASELINE_NAME"
          
          # Upload telemetry file to S3
          aws s3 cp benchmark_results/telemetry.json "s3://${{ vars.BASELINES_BUCKET || 'ragzoom-baselines' }}/${BASELINE_NAME}"
          
          # Update latest.json pointer in S3
          echo "$BASELINE_NAME" > latest.json
          aws s3 cp latest.json "s3://${{ vars.BASELINES_BUCKET || 'ragzoom-baselines' }}/latest.json"
          rm latest.json
          
          echo "✅ Baseline uploaded successfully"
          echo "   File: ${BASELINE_NAME}"
          echo "   Commit: ${{ github.sha }}"
          echo "   Bucket: ${{ vars.BASELINES_BUCKET || 'ragzoom-baselines' }}"