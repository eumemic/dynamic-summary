name: Performance Tests

on:
  pull_request:
    branches: [ master, main ]
  push:
    branches: [ master, main, fix/summary-size-bug ]

permissions:
  contents: read
  pull-requests: write

jobs:
  benchmark:
    name: Run Performance Benchmarks
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Download baseline benchmarks
        uses: actions/download-artifact@v4
        with:
          name: baseline-benchmarks-latest
          path: baseline_results
        continue-on-error: true
      
      - name: Check baseline availability
        id: baseline_check
        run: |
          if [ -d "baseline_results" ] && [ -f "baseline_results/metadata.json" ]; then
            echo "has_baseline=true" >> $GITHUB_OUTPUT
            echo "✅ Found baseline benchmarks"
            cat baseline_results/metadata.json
          else
            echo "has_baseline=false" >> $GITHUB_OUTPUT
            echo "⚠️ No baseline benchmarks found - will generate on-demand"
          fi
      
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      
      - name: Generate baseline if needed
        if: steps.baseline_check.outputs.has_baseline == 'false'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          RAGZOOM_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "Generating baseline benchmarks from ${{ github.base_ref }}..."
          
          # Clone base branch
          git clone --depth 1 --branch ${{ github.base_ref }} https://github.com/${{ github.repository }}.git base_branch
          
          cd base_branch
          
          # Check if benchmark tests exist on base branch
          if [ -d "tests/benchmarks" ] && [ -f "tests/benchmarks/test_indexing_performance.py" ]; then
            echo "Running baseline benchmarks..."
            pip install -r requirements.txt
            pip install -r requirements-dev.txt
            
            # Run baseline benchmarks
            mkdir -p benchmark_results
            for chunk_size in 100 200 400; do
              echo "Running baseline benchmark with chunk_size=$chunk_size"
              pytest tests/benchmarks/test_indexing_performance.py::test_indexing_performance -k "leaf_tokens==$chunk_size and document_type==narrative" -v || true
            done
            
            # Move results
            mv benchmark_results ../baseline_results
            cd ..
            rm -rf base_branch
          else
            echo "No benchmark tests on base branch - skipping baseline"
            mkdir -p baseline_results
            echo "No baseline benchmarks available" > baseline_results/README.md
          fi
      
      - name: Run PR benchmarks
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          RAGZOOM_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "Current directory: $(pwd)"
          echo "Python version: $(python --version)"
          echo "Checking for benchmark tests..."
          ls -la tests/benchmarks/ || echo "⚠️ No benchmarks directory"
          
          # Verify API key is set
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "❌ OPENAI_API_KEY is not set!"
            exit 1
          else
            echo "✅ OPENAI_API_KEY is configured"
          fi
          # Run benchmarks for different chunk sizes
          mkdir -p benchmark_results
          
          for chunk_size in 100 200 400; do
            echo "Running PR benchmark with chunk_size=$chunk_size"
            pytest tests/benchmarks/test_indexing_performance.py::test_indexing_performance -k "leaf_tokens==$chunk_size and document_type==narrative" -v || {
              echo "⚠️ Benchmark failed for chunk_size=$chunk_size"
              echo "Creating empty result file..."
              echo '{"error": "Benchmark failed to run"}' > "benchmark_results/metrics_${chunk_size}_tokens.json"
            }
          done
      
      - name: Compare results
        id: compare
        run: |
          # Check if we have baseline results
          if [ ! -d "baseline_results" ] || [ ! -f "baseline_results/metrics_100_tokens.json" ]; then
            echo "## 📊 Performance Report" > report.md
            echo "" >> report.md
            echo "⚠️ No baseline benchmarks available." >> report.md
            echo "" >> report.md
            echo "This is the first PR with performance benchmarks. Future PRs will compare against these results." >> report.md
            echo "" >> report.md
            echo "### Current Performance" >> report.md
            echo "" >> report.md
            
            # Show current results
            for file in benchmark_results/metrics_*_tokens.json; do
              if [ -f "$file" ]; then
                chunk_size=$(basename "$file" | sed 's/metrics_\([0-9]*\)_tokens.json/\1/')
                echo "**Chunk size: $chunk_size tokens**" >> report.md
                python -c "import json; f = open('$file'); data = json.load(f); m = data['metrics']; print(f\"- Throughput: {m['timing']['tokens_per_second']:.1f} tokens/sec\"); print(f\"- Time per 1K tokens: {m['timing']['time_per_1k_tokens']:.2f}s\"); print(f\"- Cost per 1K tokens: \${m['efficiency']['cost_per_1k_tokens']:.4f}\")" >> report.md
                echo "" >> report.md
              fi
            done
          else
            # Generate comparison report
            python scripts/compare_benchmarks.py baseline_results benchmark_results report.md || echo "REGRESSION=true" >> $GITHUB_OUTPUT
          fi
          
          # Save report for comment
          if [ -f report.md ]; then
            cat report.md >> $GITHUB_STEP_SUMMARY
            
            # Also save as output for PR comment
            # Use a unique delimiter to avoid conflicts with content
            delimiter="$(openssl rand -hex 16)"
            {
              echo "report<<${delimiter}"
              cat report.md
              echo ""  # Ensure newline before delimiter
              echo "${delimiter}"
            } >> $GITHUB_OUTPUT
          fi
      
      - name: Comment PR with results
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const report = `${{ steps.compare.outputs.report }}`;
            
            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('📊 Performance Report')
            );
            
            const body = report || '❌ Performance benchmarks failed to run';
            
            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }
      
      - name: Fail if regression detected
        if: steps.compare.outputs.REGRESSION == 'true'
        run: |
          echo "❌ Performance regression detected!"
          exit 1
      
      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results
          path: |
            baseline_results/
            benchmark_results/
            report.md
