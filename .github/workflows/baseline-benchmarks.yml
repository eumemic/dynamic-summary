name: Baseline Benchmarks

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  benchmark:
    name: Generate Baseline Benchmarks
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      
      - name: Run benchmarks
        env:
          RAGZOOM_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          mkdir -p benchmark_results
          
          # Run benchmarks for different chunk sizes
          for chunk_size in 100 200 400; do
            echo "Running benchmark with chunk_size=$chunk_size"
            pytest tests/benchmarks/test_indexing_performance.py::test_indexing_performance -k "narrative-$chunk_size" -v
          done
          
          # Add metadata
          echo "{\"commit\": \"${{ github.sha }}\", \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > benchmark_results/metadata.json
      
      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: baseline-benchmarks-${{ github.sha }}
          path: benchmark_results/
          retention-days: 90
      
      - name: Upload latest baseline
        uses: actions/upload-artifact@v4
        with:
          name: baseline-benchmarks-latest
          path: benchmark_results/
          retention-days: 7