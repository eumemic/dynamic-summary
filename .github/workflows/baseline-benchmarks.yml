name: Baseline Benchmarks

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  benchmark:
    name: Generate Baseline Benchmarks
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ragzoom_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml', 'requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements-dev.txt
      
      - name: Initialize PostgreSQL vector extension
        run: |
          # Wait for PostgreSQL to be ready
          until pg_isready -h localhost -p 5432 -U postgres; do
            echo "Waiting for PostgreSQL..."
            sleep 1
          done
          
          # Create vector extension
          PGPASSWORD=postgres psql -h localhost -p 5432 -U postgres -d ragzoom_test -c "CREATE EXTENSION IF NOT EXISTS vector;"
      
      - name: Run benchmarks
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          mkdir -p benchmark_results
          
          # Run indexing benchmark with current defaults and full Hobbit text
          echo "Running indexing benchmark with full Hobbit text and current defaults..."
          ./scripts/run-indexing-benchmarks \
            --database "postgresql+psycopg://postgres:postgres@localhost:5432/ragzoom_test" \
            --output-dir benchmark_results \
            test_data/the_hobbit.txt
          
          # Run query benchmarks (same configurations as PR tests)
          echo "Running query performance benchmarks..."
          for config in "specific-2000-10" "broad-2000-10" "complex-2000-10"; do
            echo "Running query benchmark with config=$config"
            pytest tests/benchmarks/test_query_performance.py::test_query_performance -k "$config" -v
          done
          
          # Store baseline in repository
          TIMESTAMP=$(date -u +%Y-%m-%d-%H%M%S)
          SHORT_COMMIT=$(echo "${{ github.sha }}" | cut -c1-7)
          BASELINE_NAME="telemetry-${TIMESTAMP}-${SHORT_COMMIT}.json"
          
          # Copy telemetry to baselines directory
          cp benchmark_results/telemetry.json "benchmarks/baselines/${BASELINE_NAME}"
          
          # Update latest symlink
          cd benchmarks/baselines
          rm -f latest.json
          ln -s "${BASELINE_NAME}" latest.json
          cd ../..
          
          # Cleanup old baselines (keep last 100)
          cd benchmarks/baselines
          ls -1t telemetry-*.json | tail -n +101 | xargs -r rm -f
          cd ../..
          
          # Commit and push to master
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add benchmarks/baselines/
          git commit -m "feat: add baseline telemetry for ${{ github.sha }}

          Generated on $(date -u +%Y-%m-%d) from commit ${{ github.sha }}
          
          🤖 Generated with [Claude Code](https://claude.ai/code)
          
          Co-Authored-By: Claude <noreply@anthropic.com>"
          git push origin master