[tool.black]
line-length = 88
target-version = ['py310']

[tool.ruff]
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]
ignore = ["E501"]  # Line too long (handled by black)

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
ignore_missing_imports = true
# SQLAlchemy 2.0 has native type support, no plugin needed

# Per-module options for SQLAlchemy ORM files
[[tool.mypy.overrides]]
module = "ragzoom.store"
disallow_untyped_defs = false
warn_return_any = false

[[tool.mypy.overrides]]
module = "ragzoom.retrieve"
disallow_untyped_defs = false
warn_return_any = false

[[tool.mypy.overrides]]
module = "ragzoom.assemble"
disallow_untyped_defs = false
warn_return_any = false

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"