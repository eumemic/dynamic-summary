name: Performance Tests

on:
  issue_comment:
    types: [created]

concurrency:
  # Ensure a single run per triggering comment; cancel duplicates
  group: ${{ github.workflow }}-${{ github.event.issue.number }}-${{ github.event.comment.id }}
  cancel-in-progress: true

permissions:
  contents: write      # Need write to push temporary branches
  pull-requests: write
  actions: read

jobs:
  benchmark:
    name: Performance Report
    runs-on: ubuntu-latest
    # Only run when /benchmark is in a comment on a PR by a human (not a bot)
    if: |
      github.event.comment.user.type != 'Bot' &&
      github.event_name == 'issue_comment' && 
      contains(github.event.comment.body, '/benchmark') && 
      github.event.issue.pull_request
    
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
    
    steps:
      - name: Get PR branch
        id: pr-info
        uses: actions/github-script@v7
        with:
          script: |
            const pr_number = context.issue.number;
            
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr_number
            });
            
            core.setOutput('head_ref', pr.head.ref);
            core.setOutput('pr_number', pr_number);
            
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr-info.outputs.head_ref }}
          submodules: recursive
      
      - name: Create PR comment with initial status
        id: create-comment
        uses: actions/github-script@v7
        with:
          script: |
            const timestamp = new Date().toISOString().replace('T', ' ').substring(0, 19);
            const workflowUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            
            // Create new comment for each benchmark run
            const body = `## 📊 Performance Report (${timestamp} UTC)
            
            _View [workflow run](${workflowUrl})_
            
            ⏳ **Running performance benchmarks...**`;
            
            // Always create a new comment
            const { data: newComment } = await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
            console.log(`Created new performance report comment: ${newComment.id}`);
            
            // Store comment ID for updates within this run
            core.setOutput('comment_id', newComment.id);
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml', 'requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          # Install main package with telemetry dependencies
          pip install -e .[telemetry]
          # Ensure Chroma vector backend is available for benchmarks
          pip install chromadb
          
          # Install AWS CLI for S3 baseline syncing
          pip install awscli
      
      - name: Setup baseline from S3
        run: |
          echo "🔄 Syncing baselines from S3..."
          
          if ! scripts/sync-baselines --count 5; then
            echo "❌ Failed to sync baselines from S3"
            echo "::error::Baseline sync failed - cannot proceed with performance tests"
            exit 1
          fi
          
          # Copy baselines to expected locations for benchmark comparison
          mkdir -p baseline_results
          cp benchmarks/baselines/latest.json baseline_results/telemetry.json
          
          # Copy query baseline if available
          if [ -f "benchmarks/baselines/latest-query.json" ]; then
            cp benchmarks/baselines/latest-query.json baseline_results/query-telemetry.json
            echo "✅ Both indexing and query baselines ready"
          else
            echo "📋 Only indexing baseline available (older baseline without query metrics)"
          fi
      
      - name: Setup benchmark environment
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "Current directory: $(pwd)"
          echo "Python version: $(python --version)"
          echo "Checking for benchmark tests..."
          ls -la tests/benchmarks/ || echo "⚠️ No benchmarks directory"
          
          # Verify API key is set
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "❌ OPENAI_API_KEY is not set!"
            exit 1
          else
            echo "✅ OPENAI_API_KEY is configured"
          fi
          mkdir -p benchmark_results
      
      - name: Run indexing benchmark
        id: benchmark
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -euo pipefail
          echo "Running indexing benchmark with full Hobbit text and current defaults..."
          ./scripts/run-indexing-benchmarks \
            --baseline baseline_results/telemetry.json \
            --output-dir benchmark_results \
            test_data/the_hobbit.txt
          echo "✅ Indexing benchmark completed"
          # Check for regression using CI summary
          if [ -f benchmark_results/ci-summary.json ]; then
            REGRESSION=$(jq -r '.regression_detected' benchmark_results/ci-summary.json)
            if [ "$REGRESSION" = "true" ]; then
              echo "REGRESSION=true" >> $GITHUB_OUTPUT
              echo "⚠️ Performance regression detected"
            fi
          fi
      
      - name: Update comment - indexing complete
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const timestamp = new Date().toISOString().replace('T', ' ').substring(0, 19);
            const workflowUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const comment_id = '${{ steps.create-comment.outputs.comment_id }}';
            
            const body = `## 📊 Performance Report (${timestamp} UTC)
            
            _View [workflow run](${workflowUrl})_
            
            ⏳ **Progress:**
            - ✅ Indexing benchmark complete
            - ⏱️ Running query benchmarks...`;
            
            if (comment_id) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: parseInt(comment_id),
                body
              });
            }
      
      - name: Run query benchmarks - subset
        id: query_benchmark
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # Note: Uses default QUERY_BENCHMARK_RUNS=3 for statistical variance
        run: |
          echo "Running query performance benchmark (optimized for CI)..."
          DB_INFO_FILE="benchmark_results/benchmark_db.txt"
          if [ -f "$DB_INFO_FILE" ]; then
            DB_URL=$(sed -n '2p' "$DB_INFO_FILE")
            if [ -n "$DB_URL" ]; then
              export RAGZOOM_DATABASE_URL="$DB_URL"
              export RAGZOOM_BACKEND="sqlite"
            fi
          fi
          # Ensure we reuse the same persistent vector index as indexing
          export RAGZOOM_VECTOR_BACKEND="chroma"
          # Run only the "broad" query configuration to save CI time (67% reduction)
          # This provides a representative test while maintaining statistical robustness
          
          config="broad-2000-10"
          echo "Testing configuration: $config (with 3 runs for variance)"
          
          if ! pytest tests/benchmarks/test_query_performance.py::test_query_performance -k "$config" -v --tb=short; then
            echo "❌ Query benchmark failed for: $config"
            echo "QUERY_BENCHMARK_FAILED=true" >> $GITHUB_OUTPUT
            echo "QUERY_FAILED_CONFIGS=$config" >> $GITHUB_OUTPUT
            echo "⚠️ Query benchmark failed"
          else
            echo "✅ Query benchmark passed"
          fi
          
          # Handle query telemetry file (now just one file)
          echo "📊 Processing query telemetry file..."
          QUERY_FILE="benchmark_results/query_telemetry_10seeds_2000tokens_broad.json"
          if [ -f "$QUERY_FILE" ]; then
            echo "🔍 Found query telemetry file"
            # Simply copy the single file to the expected comparison name
            cp "$QUERY_FILE" benchmark_results/query-telemetry.json
            echo "✅ Query telemetry ready for comparison"
          else
            echo "⚠️ No query telemetry file found - skipping"
            echo "   This could indicate query benchmark failed or was skipped"
          fi
      
      - name: Update comment - benchmarks complete
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const timestamp = new Date().toISOString().replace('T', ' ').substring(0, 19);
            const workflowUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const comment_id = '${{ steps.create-comment.outputs.comment_id }}';
            
            const body = `## 📊 Performance Report (${timestamp} UTC)
            
            _View [workflow run](${workflowUrl})_
            
            ⏳ **Progress:**
            - ✅ Indexing benchmark complete
            - ✅ Query benchmarks complete  
            - ⏱️ Generating visualization...`;
            
            if (comment_id) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: parseInt(comment_id),
                body
              });
            }
      
      - name: Analyze telemetry for verbatim issues
        id: analyze_telemetry
        if: success()
        run: |
          echo "🔍 Analyzing telemetry for potential issues..."
          
          # Analyze the main telemetry file
          file="benchmark_results/telemetry.json"
          
          if [ -f "$file" ]; then
            echo ""
            echo "### Analyzing indexing benchmark telemetry"
            
            # Run analysis and capture output
            if ragzoom-telemetry analyze "$file" > "analysis.txt" 2>&1; then
              # Check for verbatim issues in the output
              if grep -q "Verbatim Concatenation Issues" "analysis.txt"; then
                echo "⚠️ VERBATIM ISSUES DETECTED in indexing benchmark!"
                echo "VERBATIM_DETECTED=true" >> $GITHUB_OUTPUT
                
                # Extract verbatim details for report
                grep -A 20 "Verbatim Concatenation Issues" "analysis.txt" > "verbatim_details.txt"
              else
                echo "✅ No verbatim issues detected"
              fi
            else
              echo "❌ Analysis failed"
            fi
          else
            echo "⚠️ Telemetry file not found: $file"
          fi
      
      # Removed separate benchmark error check; the indexing step fails immediately on error now
      
      - name: Generate visualization
        id: visualize
        run: |
          # Generate side-by-side visualization if both files exist
          if [ -f "baseline_results/telemetry.json" ] && [ -f "benchmark_results/telemetry.json" ]; then
            echo "📊 Generating side-by-side visualization..."
            ragzoom-telemetry visualize baseline_results/telemetry.json benchmark_results/telemetry.json -o comparison.png || {
              echo "⚠️ Failed to generate visualization"
            }
            if [ -f "comparison.png" ]; then
              echo "✅ Visualization generated successfully"
              echo "VISUALIZATION_GENERATED=true" >> $GITHUB_OUTPUT
              
              # Upload visualization to S3 for immediate availability
              # Note: Consider configuring S3 lifecycle policy to auto-delete old visualizations:
              #   - Delete visualizations/ after 30-60 days to manage storage costs
              #   - Keep longer for merged PRs if needed for historical analysis
              BUCKET_NAME="${{ vars.BASELINES_BUCKET || 'ragzoom' }}"
              S3_PATH="visualizations/pr-${{ github.event.pull_request.number }}/run-${{ github.run_id }}/comparison.png"
              S3_URI="s3://${BUCKET_NAME}/${S3_PATH}"
              
              echo "📤 Uploading visualization to S3: ${S3_URI}"
              
              # Verify bucket access
              if ! aws s3api head-bucket --bucket "$BUCKET_NAME" 2>/dev/null; then
                echo "❌ Error: Cannot access S3 bucket '$BUCKET_NAME'"
                echo "⚠️ Visualization won't be published, but this doesn't affect the performance report"
                VISUALIZATION_URL=""
              else
                # Upload visualization 
                if aws s3 cp comparison.png "$S3_URI" --no-progress; then
                  # Generate presigned URL (valid for 30 days)
                  VISUALIZATION_URL=$(aws s3 presign "$S3_URI" --expires-in 2592000)
                  echo "✅ Visualization uploaded successfully"
                  echo "📸 Image available at: $VISUALIZATION_URL"
                else
                  echo "❌ Failed to upload visualization to S3"
                  echo "⚠️ This doesn't affect the performance report itself"
                  VISUALIZATION_URL=""
                fi
              fi
              
              echo "VISUALIZATION_URL=$VISUALIZATION_URL" >> $GITHUB_OUTPUT
            fi
          else
            echo "⚠️ Skipping visualization - missing telemetry.json files"
          fi
      
      - name: Update comment - visualization complete
        uses: actions/github-script@v7
        with:
          script: |
            const timestamp = new Date().toISOString().replace('T', ' ').substring(0, 19);
            const workflowUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const comment_id = '${{ steps.create-comment.outputs.comment_id }}';
            
            const body = `## 📊 Performance Report (${timestamp} UTC)
            
            _View [workflow run](${workflowUrl})_
            
            ⏳ **Progress:**
            - ✅ Indexing benchmark complete
            - ✅ Query benchmarks complete  
            - ✅ Visualization generated
            - ⏱️ Generating comparison report...`;
            
            if (comment_id) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: parseInt(comment_id),
                body
              });
            }
      
      - name: Compare results
        id: compare
        run: |
          set +e  # Don't exit on error, we handle exit codes manually
          # Check if we have baseline results
          if [ ! -d "baseline_results" ] || [ ! -f "baseline_results/telemetry.json" ]; then
            echo "⚠️ No baseline benchmarks available." > report.md
            echo "" >> report.md
            echo "This is the first PR with performance benchmarks. Future PRs will compare against these results." >> report.md
          else
            # Generate comparison report using ragzoom-telemetry
            echo "🔍 Checking for baseline and current benchmark files..."
            ls -la baseline_results/ || echo "No baseline_results directory"
            ls -la benchmark_results/ || echo "No benchmark_results directory"
            
            # Test ragzoom-telemetry installation
            echo "🧪 Testing ragzoom-telemetry installation..."
            ragzoom-telemetry --help > /dev/null || {
              echo "❌ ragzoom-telemetry command not found or failed" > report.md
              echo "REGRESSION=true" >> $GITHUB_OUTPUT
              exit 1
            }
            
            # Test Python imports
            echo "🐍 Testing Python imports..."
            python -c "from ragzoom.telemetry_analysis import compute_simplified_metrics; print('✅ ragzoom imports OK')" || {
              echo "❌ Failed to import ragzoom.telemetry module" > report.md
              echo "Check that ragzoom package was installed correctly before ragzoom-telemetry" >> report.md
              echo "REGRESSION=true" >> $GITHUB_OUTPUT
              exit 1
            }
            
            # Compare indexing telemetry
            comparison_exit_code=0
            echo "" > report.md  # Initialize report
            
            if [ -f "baseline_results/telemetry.json" ] && [ -f "benchmark_results/telemetry.json" ]; then
              echo "📊 Running indexing benchmark comparison..."
              # Run indexing comparison and capture both output and exit code
              set +e
              ragzoom-telemetry compare baseline_results/telemetry.json benchmark_results/telemetry.json >> report.md 2>&1
              indexing_exit_code=$?
              set -e
              
              if [ $indexing_exit_code -ne 0 ]; then
                comparison_exit_code=1
              fi
            else
              echo "❌ Indexing benchmark files not found" >> report.md
              echo "" >> report.md
              echo "Looking for:" >> report.md
              echo "- baseline_results/telemetry.json" >> report.md  
              echo "- benchmark_results/telemetry.json" >> report.md
              echo "" >> report.md
              comparison_exit_code=1
            fi
            
            # Compare query telemetry if available
            if [ -f "baseline_results/query-telemetry.json" ] && [ -f "benchmark_results/query-telemetry.json" ]; then
              echo "🔍 Running query benchmark comparison..."
              echo "" >> report.md
              echo "---" >> report.md
              echo "" >> report.md
              
              # Run query comparison and capture both output and exit code
              set +e
              ragzoom-telemetry compare baseline_results/query-telemetry.json benchmark_results/query-telemetry.json >> report.md 2>&1
              query_exit_code=$?
              set -e
              
              if [ $query_exit_code -ne 0 ]; then
                comparison_exit_code=1
              fi
            else
              if [ -f "benchmark_results/query-telemetry.json" ]; then
                echo "" >> report.md
                echo "### 📋 Query Performance Metrics" >> report.md
                echo "" >> report.md
                echo "Query telemetry was collected but no baseline is available for comparison." >> report.md
                echo "This is expected for the first PR with query metrics after the baseline system was updated." >> report.md
                echo "" >> report.md
              fi
            fi
            
            if [ $comparison_exit_code -ne 0 ]; then
              echo "REGRESSION=true" >> $GITHUB_OUTPUT
            fi
          fi
          
          # Add verbatim warnings to report if detected
          if [ "${{ steps.analyze_telemetry.outputs.VERBATIM_DETECTED }}" == "true" ]; then
            echo "" >> report.md
            echo "### ⚠️ Verbatim Concatenation Issues Detected" >> report.md
            echo "" >> report.md
            echo "The LLM is returning input text verbatim instead of creating proper summaries." >> report.md
            echo "This indicates a potential issue with summarization quality." >> report.md
            echo "" >> report.md
            
            # Add details from verbatim analysis
            verbatim_file="verbatim_details.txt"
            if [ -f "$verbatim_file" ]; then
              echo "**Indexing Benchmark Details**" >> report.md
              echo '```' >> report.md
              cat "$verbatim_file" >> report.md
              echo '```' >> report.md
              echo "" >> report.md
            fi
          fi
          
          # Save report for comment
          if [ -f report.md ]; then
            cat report.md >> $GITHUB_STEP_SUMMARY
            
            # Also save as output for PR comment
            # GitHub Actions requires a unique delimiter for multi-line outputs
            # to prevent injection attacks. Using openssl is the recommended approach.
            delimiter="$(openssl rand -hex 16)"
            {
              echo "report<<${delimiter}"
              cat report.md
              echo ""  # Ensure newline before delimiter
              echo "${delimiter}"
            } >> $GITHUB_OUTPUT
          fi
          
          # Exit with success - regression detection is handled by separate step
          exit 0
      
      - name: Update PR comment with final results
        uses: actions/github-script@v7
        if: always()
        env:
          REPORT_CONTENT: ${{ steps.compare.outputs.report }}
        with:
          script: |
            const timestamp = new Date().toISOString().replace('T', ' ').substring(0, 19);
            const workflowUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const comment_id = '${{ steps.create-comment.outputs.comment_id }}';
            // Get report from environment variable to avoid template literal issues
            const report = process.env.REPORT_CONTENT || '';
            const visualizationUrl = `${{ steps.visualize.outputs.VISUALIZATION_URL }}`;
            
            // Build final comment body
            let body = `## 📊 Performance Report (${timestamp} UTC)\n\n`;
            body += `_View [workflow run](${workflowUrl})_\n\n`;
            
            // Check for benchmark errors first
            // If job reached here with failure, show a generic error
            if ('${{ job.status }}' === 'failure') {
              body += '## ❌ Benchmark Execution Error\n\n';
              body += 'The benchmarks failed to run due to code errors.\n\n';
              body += 'This typically means:\n';
              body += '- Syntax errors in the code\n';
              body += '- Missing dependencies\n';
              body += '- Configuration issues\n\n';
              body += 'Check the [workflow logs](' + workflowUrl + ') for details.\n\n';
              body += '**This is not a performance regression - the code needs to be fixed.**';
            } else if (report) {
              // Add the comparison report first (includes verbatim check)
              body += report;
              
              // Add query benchmark status if there were failures
              const queryFailed = `${{ steps.query_benchmark.outputs.QUERY_BENCHMARK_FAILED }}` === 'true';
              const failedConfigs = `${{ steps.query_benchmark.outputs.QUERY_FAILED_CONFIGS }}`;
              
              if (queryFailed && failedConfigs) {
                body += `\n### ⚠️ Query Benchmark Failures\n\n`;
                body += `Some query performance benchmarks failed: **${failedConfigs}**\n\n`;
                body += `This may indicate issues with query processing or API connectivity.\n\n`;
              }
              
              // Add visualization after the report if it was generated
              if (visualizationUrl) {
                body += `\n### Performance Visualization\n\n`;
                body += `![Telemetry Comparison](${visualizationUrl})\n\n`;
              }
            } else {
              body += '❌ **Unable to generate performance report**\n\n';
              body += 'Check the [workflow logs](' + workflowUrl + ') for details.';
            }
            
            if (comment_id) {
              // Update the comment created at the beginning
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: parseInt(comment_id),
                body
              });
              console.log(`Updated comment with final results: ${comment_id}`);
            } else {
              // Fallback: create new comment if somehow we don't have the initial comment ID
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }
      
      # Step removed: indexing step now fails directly on error, surfacing the root cause
      
      - name: Fail if query benchmarks failed
        if: steps.query_benchmark.outputs.QUERY_BENCHMARK_FAILED == 'true'
        run: |
          echo "❌ Query benchmark failures detected!"
          echo "Failed configurations: ${{ steps.query_benchmark.outputs.QUERY_FAILED_CONFIGS }}"
          echo "Query benchmarks must pass to ensure query performance is working correctly."
          echo "Check the workflow logs for details."
          exit 1
      
      - name: Fail if regression detected
        if: steps.benchmark.outputs.REGRESSION == 'true'
        run: |
          echo "❌ Performance regression detected!"
          exit 1
      
      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results
          path: |
            baseline_results/
            benchmark_results/
            report.md
            comparison.png
