syntax = "proto3";

package ragzoom.rpc;

option go_package = "ragzoom/rpc";

// Timestamp for temporal metadata in client-controlled chunking.
// Used to associate time ranges with appended chunks.
message Timestamp {
  string time_start = 1;  // ISO 8601 with timezone (e.g., "2024-01-21T14:30:00Z")
  optional string time_end = 2;  // If omitted, time_end = time_start
}

// Self-contained unit for batch_append with bundled text and optional timestamps.
// Valid: neither timestamp, only time_start (used for both), or both.
// Invalid: time_end without time_start.
message AppendUnit {
  bytes content = 1;  // Text content
  optional string time_start = 2;  // ISO 8601 with timezone
  optional string time_end = 3;    // ISO 8601 with timezone (defaults to time_start if omitted)
}

message DocumentStats {
  string document_id = 1;
  int32 chunks_created = 2;
  int32 mutated_nodes = 3;
  int32 resummarized_nodes = 4;
  int32 new_leaves = 5;
  int32 total_leaves = 6;
  string telemetry_json = 7;
  int32 tree_depth = 8;
}

message IndexDocumentRequest {
  string document_id = 1;
  oneof source {
    bytes content = 2;
    string file_path = 3;
  }
  bool collect_telemetry = 4;
}

message IndexDocumentResponse {
  DocumentStats stats = 1;
}

message AppendTextRequest {
  string document_id = 1;
  bytes content = 2;
  bool collect_telemetry = 3;
  bool replace_existing = 4;
  optional Timestamp timestamp = 5;  // Optional timestamp for this chunk
  optional string summarization_guidance = 6;  // Additional guidance for summary generation (appended to default prompt)
}

message AppendTextResponse {
  DocumentStats stats = 1;
  string telemetry_run_id = 2;
  int32 span_start = 3;
  int32 span_end = 4;
}

message BatchAppendTextRequest {
  string document_id = 1;
  repeated AppendUnit units = 2;  // Self-contained units with bundled text and optional timestamps
  bool collect_telemetry = 3;
  optional string summarization_guidance = 4;  // Additional guidance for summary generation
}

message BatchAppendTextResponse {
  DocumentStats stats = 1;
  string telemetry_run_id = 2;
  int32 span_start = 3;
  int32 span_end = 4;
}

message RetrieveRequest {
  string query = 1;
  string document_id = 2;
  int32 budget_tokens = 3;
  int32 num_seeds = 4;
}

message Node {
  string node_id = 1;
  string text = 2;
  int32 token_count = 3;
  int32 span_start = 4;
  int32 span_end = 5;
  string parent_id = 6;
  string left_child_id = 7;
  string right_child_id = 8;
  int32 height = 9;
  // Temporal metadata for JSON output mode
  optional string time_start = 10;  // ISO 8601 with timezone (e.g., "2024-01-21T10:00:00Z")
  optional string time_end = 11;    // ISO 8601 with timezone (e.g., "2024-01-21T10:30:00Z")
}

message RetrieveResponse {
  repeated string selected_ids = 1;
  repeated string tiling_ids = 2;
  map<string, double> scores = 3;
  map<string, bool> coverage_map = 4;
  map<string, Node> nodes = 5;
}

message ExecuteQueryRequest {
  string query = 1;
  string document_id = 2;
  int32 budget_tokens = 3;
  int32 num_seeds = 4;
  string embedding_model = 5;
  bool debug = 6;
  int32 viz_width = 7;
  bool use_token_coords = 8;
  string tiling_strategy = 9;
  int32 recent_verbatim_token_budget = 10;
  bool profile = 11;
  int32 span_start = 12;
  optional int32 span_end = 13;
  // Temporal metadata: ISO 8601 timestamps with timezone for time-windowed queries
  optional string time_start = 20;  // ISO 8601 with timezone (e.g., "2024-01-21T14:00:00Z")
  optional string time_end = 21;    // ISO 8601 with timezone (e.g., "2024-01-21T15:00:00Z")
}

message QueryTelemetry {
  // Phase timings in milliseconds
  double embedding_ms = 1;
  double search_ms = 2;
  double mmr_ms = 3;
  double coverage_map_ms = 4;
  double scoring_ms = 5;
  double tiling_ms = 6;
  double assembly_ms = 7;
  double total_ms = 8;

  // Metrics
  int32 seeds_requested = 10;
  int32 seeds_found = 11;
  int32 candidates_retrieved = 12;
  int32 candidates_filtered = 13;
  int32 coverage_size = 14;
  int32 tiling_size = 15;
  int32 output_tokens = 16;

  // Model info
  string embedding_model = 20;
}

message ExecuteQueryResponse {
  string summary = 1;
  int32 token_count = 2;
  int32 nodes_retrieved = 3;
  int32 tiling_size = 4;
  RetrieveResponse retrieval = 5;
  string visualization = 6;
  string validation_warning = 7;
  string query_id = 8;
  int32 seed_count = 9;
  int32 verbatim_count = 10;
  QueryTelemetry telemetry = 11;
  int32 actual_start = 12;
  optional int32 actual_end = 13;
}

enum WorkerRunMode {
  WORKER_RUN_MODE_UNSPECIFIED = 0;
  WORKER_RUN_MODE_UNTIL_IDLE = 1;
  WORKER_RUN_MODE_CONTINUOUS = 2;
}

message RunWorkersRequest {
  WorkerRunMode mode = 1;
}

message WorkerDocumentProgress {
  string document_id = 1;
  int32 pending = 2;
  int32 inflight = 3;
  int32 completed = 4;
  int32 total = 5;
}

message RunWorkersResponse {
  string message = 1;
  bool idle = 2;
  int32 queue_depth = 3;
  int32 inflight = 4;
  repeated WorkerDocumentProgress documents = 5;
}

message GetDocumentRequest {
  string document_id = 1;
}

message DocumentStatus {
  string document_id = 1;
  int32 leaf_count = 2;
  bool has_pending_work = 3;
  int32 tree_depth = 4;
  bool is_temporal = 5;  // True if document has temporal metadata (timestamps)
}

message GetDocumentResponse {
  DocumentStatus status = 1;
}

message GetTelemetryRequest {
  string document_id = 1;
  string run_id = 2;
  bool wait = 3;
}

message GetTelemetryResponse {
  bool complete = 1;
  string telemetry_json = 2;
  string error = 3;
}

message ClearDocumentRequest {
  repeated string document_ids = 1;
  bool clear_all = 2;
}

message ClearDocumentResult {
  string document_id = 1;
  int32 deleted_nodes = 2;
  bool document_existed = 3;
}

message ClearDocumentResponse {
  repeated ClearDocumentResult results = 1;
}

message TruncateDocumentRequest {
  string document_id = 1;
  int32 span_start = 2;
}

message TruncateDocumentResponse {
  string document_id = 1;
  repeated string deleted_node_ids = 2;
  int32 span_start = 3;
}

// Document status with completion metrics for stateless sync workflows.
// Unlike GetDocument/DocumentStatus which focuses on work queue state,
// this provides document completeness and temporal range information.
message DocumentStatusRequest {
  string document_id = 1;
}

message DocumentStatusResponse {
  string document_id = 1;
  bool exists = 2;
  bool is_temporal = 3;
  int32 leaf_count = 4;
  int32 node_count = 5;
  int32 complete_forest_size = 6;  // Expected nodes when fully indexed: 2N - popcount(N)
  float completion_pct = 7;         // node_count / complete_forest_size * 100
  optional string time_start = 8;   // ISO 8601: earliest content (null if non-temporal or empty)
  optional string time_end = 9;     // ISO 8601: latest content (null if non-temporal or empty)
}

// Time-based truncation for temporal documents.
// Removes all nodes where time_end > cutoff_time.
message TruncateFromTimeRequest {
  string document_id = 1;
  string cutoff_time = 2;  // ISO 8601 timestamp
}

message TruncateFromTimeResponse {
  string document_id = 1;
  repeated string deleted_node_ids = 2;
  string cutoff_time = 3;  // Echo back the cutoff
}

message ExportTelemetryRequest {
  string document_id = 1;
}

message ExportTelemetryResponse {
  string telemetry_json = 1;
  string error = 2;
}

service IndexerService {
  rpc IndexDocument(IndexDocumentRequest) returns (IndexDocumentResponse);
  rpc AppendText(AppendTextRequest) returns (AppendTextResponse);
  rpc BatchAppendText(BatchAppendTextRequest) returns (BatchAppendTextResponse);
  rpc TruncateDocument(TruncateDocumentRequest) returns (TruncateDocumentResponse);
  rpc TruncateFromTime(TruncateFromTimeRequest) returns (TruncateFromTimeResponse);
}

service RetrievalService {
  rpc Retrieve(RetrieveRequest) returns (RetrieveResponse);
  rpc ExecuteQuery(ExecuteQueryRequest) returns (ExecuteQueryResponse);
}

// List all indexed documents
message ListDocumentsRequest {}

message ListDocumentsResponse {
  repeated DocumentInfo documents = 1;
}

message DocumentInfo {
  string document_id = 1;
  int64 leaf_count = 2;
  int64 node_count = 3;
  bool is_temporal = 4;
  optional string time_start = 5;  // ISO 8601
  optional string time_end = 6;    // ISO 8601
  optional double completion_pct = 7;
}

// Get system-wide status (aggregated across all documents)
message GetSystemStatusRequest {}

message GetSystemStatusResponse {
  int64 total_nodes = 1;
  int64 leaf_nodes = 2;
  int64 tree_depth = 3;
}

// Get cost statistics
message GetCostStatsRequest {
  optional string document_id = 1;  // If omitted, returns all docs
}

message GetCostStatsResponse {
  repeated DocumentCostStats documents = 1;
}

message DocumentCostStats {
  string document_id = 1;
  double total_cost = 2;       // Sum of all node costs (arbitrary units)
  int64 total_nodes = 3;       // Total node count
  int64 leaf_nodes = 4;        // Leaf node count
  int64 summary_nodes = 5;     // Summary node count (total - leaf)
}

service WorkerService {
  rpc RunWorkers(RunWorkersRequest) returns (stream RunWorkersResponse);
  rpc GetDocument(GetDocumentRequest) returns (GetDocumentResponse);
  rpc GetDocumentStatus(DocumentStatusRequest) returns (DocumentStatusResponse);
  rpc GetTelemetry(GetTelemetryRequest) returns (GetTelemetryResponse);
  rpc ClearDocument(ClearDocumentRequest) returns (ClearDocumentResponse);
  rpc ExportTelemetry(ExportTelemetryRequest) returns (ExportTelemetryResponse);
  rpc ListDocuments(ListDocumentsRequest) returns (ListDocumentsResponse);
  rpc GetSystemStatus(GetSystemStatusRequest) returns (GetSystemStatusResponse);
  rpc GetCostStats(GetCostStatsRequest) returns (GetCostStatsResponse);
}

// Session ingestion service for Claude Code transcripts
message GetSessionCursorRequest {
  string session_id = 1;
}

message GetSessionCursorResponse {
  int64 byte_offset = 1;
}

message IngestSessionRequest {
  string session_id = 1;
  bytes jsonl_delta = 2;  // Raw JSONL bytes to append
}

message IngestSessionResponse {
  int64 new_byte_offset = 1;
  int32 messages_processed = 2;
  bool truncated = 3;  // True if revert was detected and document was truncated
  int32 truncate_span = 4;  // Span position truncated to (if truncated)
}

message GetCompactionBoundaryRequest {
  string session_id = 1;
}

message GetCompactionBoundaryResponse {
  bool has_boundary = 1;  // True if compaction has occurred
  int32 span_end = 2;  // Span position just before post-compaction content
}

message ResetSessionCursorRequest {
  string session_id = 1;
}

message ResetSessionCursorResponse {
  bool success = 1;
  string message = 2;
}

service SessionIngestionService {
  rpc GetSessionCursor(GetSessionCursorRequest) returns (GetSessionCursorResponse);
  rpc IngestSession(IngestSessionRequest) returns (IngestSessionResponse);
  rpc GetCompactionBoundary(GetCompactionBoundaryRequest) returns (GetCompactionBoundaryResponse);
  rpc ResetSessionCursor(ResetSessionCursorRequest) returns (ResetSessionCursorResponse);
}

// Agentic search: question in, answer out.
// The server runs an internal LLM agent that iteratively zooms into
// the conversation memory to find the answer.

message SearchRequest {
  string question = 1;
  string document_id = 2;
  optional string session_id = 3;  // Continue an existing search session
  optional string time_start = 4;  // ISO 8601 lower bound for search
  optional string time_end = 5;    // ISO 8601 upper bound for search
  optional string search_guidance = 6;  // Additional guidance appended to search agent system prompt
}

message SearchIterationProto {
  string query = 1;
  int32 budget_tokens = 2;
  optional string time_start = 3;
  optional string time_end = 4;
  string result_text = 5;
  int32 result_token_count = 6;
  string agent_reasoning = 7;
}

message SearchProfileProto {
  repeated SearchIterationProto iterations = 1;
  int32 total_input_tokens = 2;
  int32 total_output_tokens = 3;
  optional double total_cost_usd = 4;
  double duration_seconds = 5;
  string retrospective = 6;
  string transcript = 7;
}

message SearchResponse {
  string answer = 1;
  optional SearchProfileProto profile = 2;
  optional string session_id = 3;  // Session ID for follow-up questions
}

service SearchService {
  rpc Search(SearchRequest) returns (SearchResponse);
}
