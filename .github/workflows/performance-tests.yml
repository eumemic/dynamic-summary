name: Performance Tests

on:
  pull_request:
    branches: [ master, main ]
  push:
    branches: [ master, main, fix/summary-size-bug ]

permissions:
  contents: read
  pull-requests: write

jobs:
  benchmark:
    name: Run Performance Benchmarks
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          path: pr
      
      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}
          path: base
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pr/requirements.txt', 'pr/requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies (base)
        working-directory: base
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      
      - name: Run baseline benchmarks
        working-directory: base
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          RAGZOOM_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "Current directory: $(pwd)"
          echo "Python version: $(python --version)"
          echo "Checking for pytest and markers..."
          pytest --markers | grep benchmark || echo "⚠️ No benchmark marker found"
          # Check if benchmark tests exist on base branch
          if [ -d "tests/benchmarks" ]; then
            echo "Running baseline benchmarks..."
            # Check if the specific test file exists
            if [ ! -f "tests/benchmarks/test_indexing_performance.py" ]; then
              echo "⚠️ Benchmark test file not found on base branch"
              mkdir -p ../baseline_results
              echo "No baseline benchmarks available" > ../baseline_results/README.md
              exit 0
            fi
            mkdir -p benchmark_results
            
            for chunk_size in 100 200 400; do
              echo "Running baseline benchmark with chunk_size=$chunk_size"
              pytest tests/benchmarks/test_indexing_performance.py::test_indexing_performance -m benchmark -k "$chunk_size" -v
            done
            
            # Copy results
            cp -r benchmark_results ../baseline_results
          else
            echo "No benchmark tests on base branch - skipping baseline"
            mkdir -p ../baseline_results
            echo "No baseline benchmarks available" > ../baseline_results/README.md
          fi
      
      - name: Install dependencies (PR)
        working-directory: pr
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      
      - name: Run PR benchmarks
        working-directory: pr
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          RAGZOOM_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "Current directory: $(pwd)"
          echo "Python version: $(python --version)"
          echo "Checking for benchmark tests..."
          ls -la tests/benchmarks/ || echo "⚠️ No benchmarks directory"
          
          # Verify API key is set
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "❌ OPENAI_API_KEY is not set!"
            exit 1
          else
            echo "✅ OPENAI_API_KEY is configured"
          fi
          # Run benchmarks for different chunk sizes
          mkdir -p benchmark_results
          
          for chunk_size in 100 200 400; do
            echo "Running PR benchmark with chunk_size=$chunk_size"
            pytest tests/benchmarks/test_indexing_performance.py::test_indexing_performance -m benchmark -k "$chunk_size" -v || {
              echo "⚠️ Benchmark failed for chunk_size=$chunk_size"
              echo "Creating empty result file..."
              echo '{"error": "Benchmark failed to run"}' > "benchmark_results/metrics_${chunk_size}_tokens.json"
            }
          done
      
      - name: Compare results
        working-directory: pr
        id: compare
        run: |
          # Check if we have baseline results
          if [ -f "../baseline_results/README.md" ] || [ -z "$(ls -A ../baseline_results 2>/dev/null)" ]; then
            echo "## 📊 Performance Report" > report.md
            echo "" >> report.md
            echo "⚠️ No baseline benchmarks available on master branch." >> report.md
            echo "" >> report.md
            echo "This is the first PR with performance benchmarks. Future PRs will compare against these results." >> report.md
            echo "" >> report.md
            echo "### Current Performance" >> report.md
            echo "" >> report.md
            
            # Show current results
            for file in benchmark_results/metrics_*_tokens.json; do
              if [ -f "$file" ]; then
                chunk_size=$(basename "$file" | sed 's/metrics_\([0-9]*\)_tokens.json/\1/')
                echo "**Chunk size: $chunk_size tokens**" >> report.md
                python -c "import json; data=json.load(open('$file')); m=data['metrics']; print(f\"- Throughput: {m['timing']['tokens_per_second']:.1f} tokens/sec\"); print(f\"- Time per 1K tokens: {m['timing']['time_per_1k_tokens']:.2f}s\"); print(f\"- Cost per 1K tokens: \\\${m['efficiency']['cost_per_1k_tokens']:.4f}\")" >> report.md
                echo "" >> report.md
              fi
            done
          else
            # Generate comparison report
            if [ -f "scripts/compare_benchmarks.py" ]; then
              python scripts/compare_benchmarks.py ../baseline_results benchmark_results report.md || echo "REGRESSION=true" >> $GITHUB_OUTPUT
            else
              echo "⚠️ Comparison script not found. Creating basic report..."
              echo "## 📊 Performance Report" > report.md
              echo "" >> report.md
              echo "⚠️ Unable to compare with baseline - comparison script missing." >> report.md
            fi
          fi
          
          # Save report for comment
          if [ -f report.md ]; then
            cat report.md >> $GITHUB_STEP_SUMMARY
            
            # Also save as output for PR comment (using GitHub Actions escaping)
            REPORT=$(cat report.md)
            REPORT="${REPORT//'%'/'%25'}"
            REPORT="${REPORT//$'\n'/'%0A'}"
            REPORT="${REPORT//$'\r'/'%0D'}"
            echo "report=${REPORT}" >> $GITHUB_OUTPUT
          fi
      
      - name: Comment PR with results
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request' && always()
        with:
          script: |
            const rawReport = `${{ steps.compare.outputs.report }}`;
            
            // Decode GitHub Actions escape sequences
            const report = rawReport
              .replace(/%0A/g, '\n')
              .replace(/%0D/g, '\r')
              .replace(/%25/g, '%');
            
            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('📊 Performance Report')
            );
            
            const body = report || '❌ Performance benchmarks failed to run';
            
            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }
      
      - name: Fail if regression detected
        if: steps.compare.outputs.REGRESSION == 'true'
        run: |
          echo "❌ Performance regression detected!"
          exit 1
      
      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results
          path: |
            baseline_results/
            pr/benchmark_results/
            pr/report.md