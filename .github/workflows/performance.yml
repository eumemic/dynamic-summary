name: Performance Tests

on:
  pull_request:
    branches: [ master, main ]

jobs:
  benchmark:
    name: Run Performance Benchmarks
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          path: pr
      
      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}
          path: base
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pr/requirements.txt', 'pr/requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies (base)
        working-directory: base
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      
      - name: Run baseline benchmarks
        working-directory: base
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          RAGZOOM_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # Run benchmarks for different chunk sizes
          mkdir -p benchmark_results
          
          for chunk_size in 100 200 400; do
            echo "Running baseline benchmark with chunk_size=$chunk_size"
            pytest tests/benchmarks/test_indexing_performance.py::test_indexing_performance -k "leaf_tokens==$chunk_size" -v || true
          done
          
          # Copy results
          cp -r benchmark_results ../baseline_results
      
      - name: Install dependencies (PR)
        working-directory: pr
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      
      - name: Run PR benchmarks
        working-directory: pr
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          RAGZOOM_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # Run benchmarks for different chunk sizes
          mkdir -p benchmark_results
          
          for chunk_size in 100 200 400; do
            echo "Running PR benchmark with chunk_size=$chunk_size"
            pytest tests/benchmarks/test_indexing_performance.py::test_indexing_performance -k "leaf_tokens==$chunk_size" -v || true
          done
      
      - name: Compare results
        working-directory: pr
        id: compare
        run: |
          # Generate comparison report
          python scripts/compare_benchmarks.py ../baseline_results benchmark_results report.md || echo "REGRESSION=true" >> $GITHUB_OUTPUT
          
          # Save report for comment
          cat report.md >> $GITHUB_STEP_SUMMARY
          
          # Also save as output for PR comment
          {
            echo 'report<<EOF'
            cat report.md
            echo EOF
          } >> $GITHUB_OUTPUT
      
      - name: Comment PR with results
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const report = `${{ steps.compare.outputs.report }}`;
            
            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('📊 Performance Report')
            );
            
            const body = report || '❌ Performance benchmarks failed to run';
            
            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }
      
      - name: Fail if regression detected
        if: steps.compare.outputs.REGRESSION == 'true'
        run: |
          echo "❌ Performance regression detected!"
          exit 1
      
      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results
          path: |
            baseline_results/
            pr/benchmark_results/
            pr/report.md