name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  claude-review:
    # Only run when @claude is mentioned in a comment on a PR
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude') && github.event.issue.pull_request) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))

    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Get PR branch
        id: pr-info
        uses: actions/github-script@v7
        with:
          script: |
            let pr_number;
            if (context.eventName === 'issue_comment') {
              pr_number = context.issue.number;
            } else if (context.eventName === 'pull_request_review_comment') {
              pr_number = context.payload.pull_request.number;
            }
            
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr_number
            });
            
            core.setOutput('head_ref', pr.head.ref);
            core.setOutput('pr_number', pr_number);
            
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr-info.outputs.head_ref }}
          # Fetch PR commits + buffer for merge base
          fetch-depth: 50
          submodules: recursive

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # Specify model: Using Claude Opus 4 for comprehensive code reviews
          model: "claude-opus-4-1-20250805"

          # Include the triggering comment as context for the review
          direct_prompt: |
            The implementer requests this review with the following context:
            "${{ github.event.comment.body }}"
            
            Please conduct your review with this guidance in mind.
            
            - FIRST review on this PR: Use the full review format from .claude/commands/review.md
            - SUBSEQUENT reviews: Use this concise format focusing only on changes since last review:
              
              ## Review Updates
              
              ### Fixed Issues:
              ✅ <concise description of what was fixed - 1-2 sentences>
              
              ### Unresolved Issues:
              ❌ Critical: <concise description - 1-2 sentences>
              ⚠️ Important: <concise description - 1-2 sentences>
              Minor: <concise description - 1-2 sentences>
              
              ### New Issues Found:
              ❌ Critical: <concise description - 1-2 sentences>
              ⚠️ Important: <concise description - 1-2 sentences>
              Minor: <concise description - 1-2 sentences>
              
              ### Summary
              <Brief assessment of progress and remaining work - 2-3 sentences max>
              
              CRITICAL FORMATTING RULE: Only include sections that have actual items! 
              - If Fixed Issues is empty → don't include that section at all
              - If Unresolved Issues is empty → don't include that section at all  
              - If New Issues Found is empty → don't include that section at all
              Never show "None" or empty sections - just omit them entirely!

            - For subsequent reviews: 
              * You have access to the full git history with fetch-depth: 50
              * Identify the commit SHA from your last review (check your previous comment timestamp)
              * Review ONLY commits made after that point: git diff <last-reviewed-sha>..HEAD
              * Focus exclusively on changes in those new commits
              * Do NOT re-review the entire PR diff from base branch
            - Check each previously-identified issue to see if it was addressed
            - Review PR comments for explanations about why certain issues may not be addressed
            - Look for any new issues introduced by the recent changes
            - Assess if new commits expand the scope beyond the original PR title/description
              * Examples of scope expansion: adding unrelated features, fixing issues not mentioned in the PR, 
                significant architectural changes beyond the stated goal, changing from bug fix to refactor
              * If scope expanded, suggest specific updates to the PR title and/or description
            - If the PR references a GitHub issue, assess progress toward addressing it
            - IMPORTANT: Focus on substantive issues that matter. Avoid nitpicking or finding problems just 
              to have something to report. If the code is good, say so. Quality > Quantity.
            - When reviewing fixes for previously-identified issues: Respect the implementer's approach. Since both 
              reviewer and implementer are likely Claude agents with similar capabilities, defer to the implementer's 
              judgment as they have more context. Only flag if the fix is clearly incorrect or introduces new problems.

          # Optional: Use sticky comments to make Claude reuse the same comment on subsequent pushes to the same PR
          use_sticky_comment: false

          # Optional: Customize review based on file types
          # direct_prompt: |
          #   Review this PR focusing on:
          #   - For TypeScript files: Type safety and proper interface usage
          #   - For API endpoints: Security, input validation, and error handling
          #   - For React components: Performance, accessibility, and best practices
          #   - For tests: Coverage, edge cases, and test quality

          # Optional: Different prompts for different authors
          # direct_prompt: |
          #   ${{ github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR' &&
          #   'Welcome! Please review this PR from a first-time contributor. Be encouraging and provide detailed explanations for any suggestions.' ||
          #   'Please provide a thorough code review focusing on our coding standards and best practices.' }}

          # Allow safe Bash commands for file inspection during review
          allowed_tools: "Bash(ls*),Bash(head*),Bash(tail*),Bash(cat*),Bash(grep*),Bash(find*),Bash(wc*),Bash(file*)"

          # Optional: Skip review for certain conditions
          # if: |
          #   !contains(github.event.pull_request.title, '[skip-review]') &&
          #   !contains(github.event.pull_request.title, '[WIP]')
