name: Code Validation

on:
  push:
    branches: [ master, main ]
    # Run on all pushes to master
  pull_request:
    branches: [ master, main ]
    # Skip CI if only docs are changed (unless [ci] is in commit message)
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.claude/**'
      - 'LICENSE'
      - '.gitignore'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Single comprehensive validation job that runs all checks
  validate:
    name: Code Validation (All Checks)
    runs-on: ubuntu-latest
    # Skip slow/integration tests on draft PRs to save compute
    
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ragzoom_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml', 'requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Cache mypy results
        uses: actions/cache@v4
        with:
          path: .mypy_cache
          key: ${{ runner.os }}-mypy-${{ hashFiles('ragzoom/**/*.py') }}
          restore-keys: |
            ${{ runner.os }}-mypy-
      
      - name: Cache pytest results
        uses: actions/cache@v4
        with:
          path: .pytest_cache
          key: ${{ runner.os }}-pytest-${{ hashFiles('tests/**/*.py', 'ragzoom/**/*.py') }}
          restore-keys: |
            ${{ runner.os }}-pytest-
            
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements-dev.txt
          # Install quality check tools
          pip install mypy[dmypy] bandit
          
      - name: Initialize PostgreSQL vector extension
        run: |
          # Wait for PostgreSQL to be ready
          until pg_isready -h localhost -p 5432 -U postgres; do
            echo "Waiting for PostgreSQL..."
            sleep 1
          done
          
          # Create vector extension
          PGPASSWORD=postgres psql -h localhost -p 5432 -U postgres -d ragzoom_test -c "CREATE EXTENSION IF NOT EXISTS vector;"
          
      - name: Run all quality checks
        env:
          RAGZOOM_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'dummy-key-for-tests' }}
          RAGZOOM_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/ragzoom_test
        run: |
          # For draft PRs, skip slow/integration tests
          if [[ "${{ github.event.pull_request.draft }}" == "true" ]]; then
            echo "Draft PR detected - running fast checks only"
            ./scripts/run-checks.sh
          else
            echo "Running all checks including slow and integration tests"
            ./scripts/run-checks.sh --include-slow-tests
          fi

  # Test coverage report (only on push to master)
  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    # Only run coverage on master pushes, not on every PR
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml', 'requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
            
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements-dev.txt
          pip install pytest-cov
          
      - name: Run tests with coverage
        env:
          RAGZOOM_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'dummy-key-for-tests' }}
        run: |
          pytest tests/ -m "not integration" -n 2 --cov=ragzoom --cov-report=term --cov-report=html --no-header
          
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          
  # Python version compatibility (only on non-draft PRs)
  python-versions:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    # Skip on draft PRs and only run on code changes
    if: |
      github.event.pull_request.draft != true &&
      (
        contains(github.event.head_commit.message, '[full-ci]') ||
        github.event_name == 'push' ||
        (github.event_name == 'pull_request' && github.event.action == 'ready_for_review')
      )
    strategy:
      matrix:
        python-version: ['3.10', '3.12']
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml', 'requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
            
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements-dev.txt
          
      - name: Run fast tests
        env:
          RAGZOOM_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'dummy-key-for-tests' }}
        run: |
          pytest tests/ -m "not slow and not integration" -n 2 --no-header -q