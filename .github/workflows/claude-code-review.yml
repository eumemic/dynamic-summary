name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch PR commits + buffer for merge base (default to 50 if not available)
          fetch-depth: 50

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # Specify model: Using Claude Opus 4 for comprehensive code reviews
          model: "claude-opus-4-20250514"

          # Direct prompt for automated review (no @claude mention needed)
          direct_prompt: |
            - FIRST review on this PR: Use the full review format from .claude/commands/review.md
            - SUBSEQUENT reviews: Use this concise format focusing only on changes since last review:
              
              ## Incremental Review - Changes Since Last Review
              
              ### Fixed Issues:
              ✅ <description of what was fixed>
              
              ### Unresolved Issues:
              ❌ Critical: <description of critical issue that still remains>
              ⚠️ Important: <description of important issue that still remains>
              Minor: <description of minor issue that still remains>
              
              ### New Issues Found:
              ❌ Critical: <description of new critical issue>
              ⚠️ Important: <description of new important issue>
              Minor: <description of new minor issue>
              
              ### Summary
              <Brief assessment of progress and remaining work>
            
            - For subsequent reviews: Examine ONLY the changes made since your last review
            - Check each previously-identified issue to see if it was addressed
            - Look for any new issues introduced by the recent changes
            - If the PR references a GitHub issue, assess progress toward addressing it

          # Optional: Use sticky comments to make Claude reuse the same comment on subsequent pushes to the same PR
          use_sticky_comment: false

          # Optional: Customize review based on file types
          # direct_prompt: |
          #   Review this PR focusing on:
          #   - For TypeScript files: Type safety and proper interface usage
          #   - For API endpoints: Security, input validation, and error handling
          #   - For React components: Performance, accessibility, and best practices
          #   - For tests: Coverage, edge cases, and test quality

          # Optional: Different prompts for different authors
          # direct_prompt: |
          #   ${{ github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR' &&
          #   'Welcome! Please review this PR from a first-time contributor. Be encouraging and provide detailed explanations for any suggestions.' ||
          #   'Please provide a thorough code review focusing on our coding standards and best practices.' }}

          # Optional: Add specific tools for running tests or linting
          # allowed_tools: "Bash(npm run test),Bash(npm run lint),Bash(npm run typecheck)"

          # Optional: Skip review for certain conditions
          # if: |
          #   !contains(github.event.pull_request.title, '[skip-review]') &&
          #   !contains(github.event.pull_request.title, '[WIP]')
