name: Baseline Benchmarks

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read  # Only need read access now (no more commits)

jobs:
  benchmark:
    name: Generate Baseline Benchmarks
    runs-on: ubuntu-latest
    
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml', 'requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies (locked)
        run: |
          python -m pip install --upgrade pip
          pip install pip-tools
          pip-sync requirements/dev.lock
          # Install AWS CLI for S3 uploads
          pip install awscli
      
      - name: Run benchmarks
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          mkdir -p benchmark_results
          
          # Run indexing benchmark with current defaults and full Hobbit text
          echo "Running indexing benchmark with full Hobbit text and current defaults..."
          ./scripts/run-indexing-benchmarks \
            --output-dir benchmark_results \
            test_data/the_hobbit.txt
          
          # Run query benchmark (optimized configuration)
          echo "Running query performance benchmark..."
          config="broad-2000-10"
          echo "Running query benchmark with config=$config (3 runs for variance)"
          pytest tests/benchmarks/test_query_performance.py::test_query_performance -k "$config" -v
          
          # Handle query telemetry file (now just one file)
          echo "📊 Processing query telemetry file..."
          QUERY_FILE="benchmark_results/query_telemetry_10seeds_2000tokens_broad.json"
          if [ -f "$QUERY_FILE" ]; then
            # Simply copy the single file to the expected baseline name
            cp "$QUERY_FILE" benchmark_results/query-telemetry.json
            echo "✅ Query telemetry ready as query-telemetry.json"
          else
            echo "⚠️ No query telemetry file found - this is unexpected"
          fi
          
          # Store baseline in S3 with folder structure
          TIMESTAMP=$(date -u +%Y-%m-%d-%H%M%S)
          FULL_COMMIT="${{ github.sha }}"
          BASELINE_FOLDER="${TIMESTAMP}-${FULL_COMMIT}"
          BUCKET_NAME="${{ vars.BASELINES_BUCKET || 'ragzoom' }}"
          BUCKET_PATH="s3://${BUCKET_NAME}/baselines/${BASELINE_FOLDER}"
          
          # Verify bucket exists
          echo "🔍 Verifying S3 bucket access: ${BUCKET_NAME}"
          if ! aws s3api head-bucket --bucket "$BUCKET_NAME" 2>/dev/null; then
            echo "❌ Error: S3 bucket '$BUCKET_NAME' does not exist or is not accessible"
            echo "Please check:"
            echo "  1. Bucket name is correct"
            echo "  2. AWS credentials have access to the bucket"
            echo "  3. Bucket exists in the specified region"
            exit 1
          fi
          
          echo "📤 Uploading baseline to S3: ${BASELINE_FOLDER}/"
          
          # Upload indexing telemetry to baseline folder
          aws s3 cp benchmark_results/telemetry.json "${BUCKET_PATH}/indexing-telemetry.json"
          
          # Upload query telemetry to baseline folder if it exists
          if [ -f "benchmark_results/query-telemetry.json" ]; then
            aws s3 cp benchmark_results/query-telemetry.json "${BUCKET_PATH}/query-telemetry.json"
            echo "✅ Query telemetry uploaded to S3"
          else
            echo "⚠️ No query telemetry to upload - this is unexpected"
          fi
          
          # Update latest.txt pointer in S3 (contains folder name)
          echo "$BASELINE_FOLDER" > latest.txt
          aws s3 cp latest.txt "s3://${BUCKET_NAME}/baselines/latest.txt"
          rm latest.txt
          
          echo "✅ Baseline uploaded successfully"
          echo "   Folder: ${BASELINE_FOLDER}/"
          echo "   Files: indexing-telemetry.json, query-telemetry.json"
          echo "   Commit: ${FULL_COMMIT}"
          echo "   Bucket: ${BUCKET_NAME}"
