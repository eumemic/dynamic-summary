name: Code Validation

on:
  push:
    branches: [ master, main ]
    # Run on all pushes to master
  pull_request:
    branches: [ master, main ]
    # Skip CI if only docs are changed (unless [ci] is in commit message)
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.claude/**'
      - 'LICENSE'
      - '.gitignore'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Combined static analysis job (saves 3 runner initializations)
  static-analysis:
    name: Static Analysis (Lint, Format, Type, Security)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml', 'requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Cache mypy results
        uses: actions/cache@v4
        with:
          path: .mypy_cache
          key: ${{ runner.os }}-mypy-${{ hashFiles('ragzoom/**/*.py') }}
          restore-keys: |
            ${{ runner.os }}-mypy-
      
      - name: Cache pytest results
        uses: actions/cache@v4
        with:
          path: .pytest_cache
          key: ${{ runner.os }}-pytest-static-${{ hashFiles('tests/**/*.py', 'ragzoom/**/*.py') }}
          restore-keys: |
            ${{ runner.os }}-pytest-static-
      
      - name: Install analysis tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff black mypy bandit
          # Only install full dependencies if mypy needs them
          pip install -e .
          pip install -r requirements-dev.txt
      
      - name: Run Ruff (linting)
        run: |
          echo "::group::Ruff Linting"
          ruff check ragzoom/ tests/ --output-format=github
          echo "::endgroup::"
      
      - name: Check Black formatting
        run: |
          echo "::group::Black Formatting"
          black --check --diff ragzoom/ tests/
          echo "::endgroup::"
      
      - name: Run MyPy (type checking)
        run: |
          echo "::group::MyPy Type Checking"
          mypy ragzoom/ --ignore-missing-imports --no-error-summary --check-untyped-defs
          echo "::endgroup::"
      
      - name: Run Bandit (security)
        run: |
          echo "::group::Bandit Security Check"
          bandit -r ragzoom/ -ll
          echo "::endgroup::"

  # Fast tests (excluding slow and integration tests)
  test-fast:
    name: Fast Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml', 'requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Cache pytest results
        uses: actions/cache@v4
        with:
          path: .pytest_cache
          key: ${{ runner.os }}-pytest-fast-${{ hashFiles('tests/**/*.py', 'ragzoom/**/*.py') }}
          restore-keys: |
            ${{ runner.os }}-pytest-fast-
            
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements-dev.txt
          
      - name: Run fast tests
        env:
          RAGZOOM_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'dummy-key-for-tests' }}
        run: |
          # Use -n 2 for optimal performance on 2-core GitHub runners
          pytest tests/ -m "not slow and not integration" -n 2 --no-header -v

  # Slow tests only (skip on draft PRs)
  test-slow:
    name: Slow Tests
    runs-on: ubuntu-latest
    # Skip on draft PRs to save compute
    if: github.event.pull_request.draft != true
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml', 'requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
            
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements-dev.txt
          
      - name: Run slow tests
        env:
          RAGZOOM_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'dummy-key-for-tests' }}
        run: |
          # Run slow tests if any exist, otherwise skip gracefully
          if pytest --collect-only -m "slow" tests/ 2>/dev/null | grep -q "0 selected"; then
            echo "No slow tests found - skipping"
            exit 0
          else
            pytest tests/ -m "slow" -n 2 --no-header -v
          fi

  # Integration tests only (skip on draft PRs)
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    # Skip on draft PRs to save compute
    if: github.event.pull_request.draft != true
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml', 'requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
            
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements-dev.txt
          
      - name: Run integration tests
        env:
          RAGZOOM_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'dummy-key-for-tests' }}
        run: |
          # Run integration tests if any exist, otherwise skip gracefully
          if pytest --collect-only -m "integration" tests/ 2>/dev/null | grep -q "0 selected"; then
            echo "No integration tests found - skipping"
            exit 0
          else
            pytest tests/ -m "integration" -n 2 --no-header -v
          fi

  # Test coverage report (only on push to master)
  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    # Only run coverage on master pushes, not on every PR
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml', 'requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
            
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements-dev.txt
          pip install pytest-cov
          
      - name: Run tests with coverage
        env:
          RAGZOOM_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'dummy-key-for-tests' }}
        run: |
          pytest tests/ -n 2 --cov=ragzoom --cov-report=term --cov-report=html --no-header
          
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          
  # Python version compatibility (only on non-draft PRs)
  python-versions:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    # Skip on draft PRs and only run on code changes
    if: |
      github.event.pull_request.draft != true &&
      (
        contains(github.event.head_commit.message, '[full-ci]') ||
        github.event_name == 'push' ||
        (github.event_name == 'pull_request' && github.event.action == 'ready_for_review')
      )
    strategy:
      matrix:
        python-version: ['3.10', '3.12']
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml', 'requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
            
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements-dev.txt
          
      - name: Run fast tests
        env:
          RAGZOOM_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'dummy-key-for-tests' }}
        run: |
          pytest tests/ -m "not slow and not integration" -n 2 --no-header -q