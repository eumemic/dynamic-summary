name: Baseline Benchmarks

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  benchmark:
    name: Generate Baseline Benchmarks
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ragzoom_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml', 'requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements-dev.txt
      
      - name: Initialize PostgreSQL vector extension
        run: |
          # Wait for PostgreSQL to be ready
          until pg_isready -h localhost -p 5432 -U postgres; do
            echo "Waiting for PostgreSQL..."
            sleep 1
          done
          
          # Create vector extension
          PGPASSWORD=postgres psql -h localhost -p 5432 -U postgres -d ragzoom_test -c "CREATE EXTENSION IF NOT EXISTS vector;"
      
      - name: Run benchmarks
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          RAGZOOM_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/ragzoom_test
        run: |
          mkdir -p benchmark_results
          
          # Run indexing benchmarks for different chunk sizes
          for chunk_size in 100 200 400; do
            echo "Running indexing benchmark with chunk_size=$chunk_size"
            pytest tests/benchmarks/test_indexing_performance.py::test_indexing_performance -k "narrative-$chunk_size" -v
          done
          
          # Run query benchmarks (same configurations as PR tests)
          echo "Running query performance benchmarks..."
          for config in "specific-2000-10" "broad-2000-10" "complex-2000-10"; do
            echo "Running query benchmark with config=$config"
            pytest tests/benchmarks/test_query_performance.py::test_query_performance -k "$config" -v
          done
          
          # Add metadata
          echo "{\"commit\": \"${{ github.sha }}\", \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > benchmark_results/metadata.json
      
      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: baseline-benchmarks-${{ github.sha }}
          path: benchmark_results/
          retention-days: 90
      
      - name: Upload latest baseline
        uses: actions/upload-artifact@v4
        with:
          name: baseline-benchmarks-latest
          path: benchmark_results/
          retention-days: 7