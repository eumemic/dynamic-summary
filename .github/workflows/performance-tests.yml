name: Performance Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [ master ]
    # Skip performance tests for docs-only changes (but run for code/test/dependency changes)
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.claude/**'
      - 'LICENSE'
      - '.gitignore'
      - '.github/workflows/*'
      - '!.github/workflows/performance-tests.yml'

permissions:
  contents: write      # Need write to push temporary branches
  pull-requests: write
  actions: read

jobs:
  benchmark:
    name: Performance Report
    runs-on: ubuntu-latest
    # Skip on draft PRs to save expensive benchmark runs
    if: github.event.pull_request.draft != true
    
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
      
      - name: Create or update PR comment with initial status
        uses: actions/github-script@v7
        with:
          script: |
            const identifier = '<!-- github-actions-perf-report-comment -->';
            const workflowUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            
            // Initial comment body
            const body = `${identifier}
            ## 📊 Performance Report
            
            _View [workflow run](${workflowUrl})_
            
            ⏳ **Running performance benchmarks...**`;
            
            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            
            console.log(`Found ${comments.length} total comments on PR`);
            
            const botComment = comments.find(comment => 
              comment.body && comment.body.includes(identifier) &&
              comment.user && comment.user.login === 'github-actions[bot]'
            );
            
            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body
              });
              console.log(`Updated existing comment: ${botComment.id}`);
            } else {
              // Create new comment
              console.log('No existing performance report comment found, creating new one');
              const { data: newComment } = await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
              console.log(`Created new comment: ${newComment.id}`);
            }
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Download baseline benchmarks
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: baseline-benchmarks.yml
          branch: master
          name: baseline-benchmarks-latest
          path: baseline_results
          if_no_artifact_found: warn
          github_token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
      
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml', 'requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          # Install main package with telemetry dependencies
          pip install -e .[telemetry]
      
      - name: Setup benchmark environment
        env:
          RAGZOOM_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "Current directory: $(pwd)"
          echo "Python version: $(python --version)"
          echo "Checking for benchmark tests..."
          ls -la tests/benchmarks/ || echo "⚠️ No benchmarks directory"
          
          # Verify API key is set
          if [ -z "$RAGZOOM_OPENAI_API_KEY" ]; then
            echo "❌ RAGZOOM_OPENAI_API_KEY is not set!"
            exit 1
          else
            echo "✅ RAGZOOM_OPENAI_API_KEY is configured"
          fi
          mkdir -p benchmark_results
      
      - name: Run benchmark - 100 tokens
        id: benchmark_100
        env:
          RAGZOOM_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "Running PR benchmark with chunk_size=100"
          if ! pytest tests/benchmarks/test_indexing_performance.py::test_indexing_performance -k "narrative-100" -v; then
            echo "❌ Benchmark failed for chunk_size=100"
            echo "Creating error result file..."
            echo '{"error": "Benchmark failed to run", "chunk_size": "100"}' > "benchmark_results/telemetry_100_tokens.json"
            echo "BENCHMARK_FAILED=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Update comment - 100 tokens complete
        uses: actions/github-script@v7
        with:
          script: |
            const identifier = '<!-- github-actions-perf-report-comment -->';
            const workflowUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            
            const body = `${identifier}
            ## 📊 Performance Report
            
            _View [workflow run](${workflowUrl})_
            
            ⏳ **Progress:**
            - ✅ 100 tokens benchmark complete
            - ⏱️ Running 200 tokens benchmark...`;
            
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            
            const botComment = comments.find(comment => 
              comment.body && comment.body.includes(identifier) &&
              comment.user && comment.user.login === 'github-actions[bot]'
            );
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body
              });
            }
      
      - name: Run benchmark - 200 tokens
        id: benchmark_200
        env:
          RAGZOOM_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "Running PR benchmark with chunk_size=200"
          if ! pytest tests/benchmarks/test_indexing_performance.py::test_indexing_performance -k "narrative-200" -v; then
            echo "❌ Benchmark failed for chunk_size=200"
            echo "Creating error result file..."
            echo '{"error": "Benchmark failed to run", "chunk_size": "200"}' > "benchmark_results/telemetry_200_tokens.json"
            echo "BENCHMARK_FAILED=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Update comment - 200 tokens complete
        uses: actions/github-script@v7
        with:
          script: |
            const identifier = '<!-- github-actions-perf-report-comment -->';
            const workflowUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            
            const body = `${identifier}
            ## 📊 Performance Report
            
            _View [workflow run](${workflowUrl})_
            
            ⏳ **Progress:**
            - ✅ 100 tokens benchmark complete
            - ✅ 200 tokens benchmark complete
            - ⏱️ Running 400 tokens benchmark...`;
            
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            
            const botComment = comments.find(comment => 
              comment.body && comment.body.includes(identifier) &&
              comment.user && comment.user.login === 'github-actions[bot]'
            );
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body
              });
            }
      
      - name: Run benchmark - 400 tokens
        id: benchmark_400
        env:
          RAGZOOM_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "Running PR benchmark with chunk_size=400"
          if ! pytest tests/benchmarks/test_indexing_performance.py::test_indexing_performance -k "narrative-400" -v; then
            echo "❌ Benchmark failed for chunk_size=400"
            echo "Creating error result file..."
            echo '{"error": "Benchmark failed to run", "chunk_size": "400"}' > "benchmark_results/telemetry_400_tokens.json"
            echo "BENCHMARK_FAILED=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Update comment - benchmarks complete
        uses: actions/github-script@v7
        with:
          script: |
            const identifier = '<!-- github-actions-perf-report-comment -->';
            const workflowUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            
            const body = `${identifier}
            ## 📊 Performance Report
            
            _View [workflow run](${workflowUrl})_
            
            ⏳ **Progress:**
            - ✅ 100 tokens benchmark complete
            - ✅ 200 tokens benchmark complete
            - ✅ 400 tokens benchmark complete
            - ⏱️ Generating visualization...`;
            
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            
            const botComment = comments.find(comment => 
              comment.body && comment.body.includes(identifier) &&
              comment.user && comment.user.login === 'github-actions[bot]'
            );
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body
              });
            }
      
      - name: Check benchmark execution
        id: benchmark_check
        run: |
          if [ "${{ steps.benchmark.outputs.BENCHMARK_FAILED }}" == "true" ]; then
            echo "❌ Critical benchmark failures detected"
            echo "REGRESSION=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Generate visualization for 200 tokens
        id: visualize
        run: |
          # Generate side-by-side visualization for 200 tokens if both files exist
          if [ -f "baseline_results/telemetry_200_tokens.json" ] && [ -f "benchmark_results/telemetry_200_tokens.json" ]; then
            echo "📊 Generating side-by-side visualization for 200 tokens..."
            ragzoom-telemetry visualize baseline_results/telemetry_200_tokens.json benchmark_results/telemetry_200_tokens.json -o comparison_200_tokens.png || {
              echo "⚠️ Failed to generate visualization"
            }
            if [ -f "comparison_200_tokens.png" ]; then
              echo "✅ Visualization generated successfully"
              echo "VISUALIZATION_GENERATED=true" >> $GITHUB_OUTPUT
              
              # Publish visualization to GitHub Pages for inline display
              # Use a subdirectory to organize images by run ID
              IMAGE_PATH="ci-visualizations/${{ github.run_id }}/comparison_200_tokens.png"
              
              # Clone gh-pages branch (or create if it doesn't exist)
              cd /tmp
              if git clone --depth 1 --branch gh-pages https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git gh-pages 2>/dev/null; then
                echo "✅ Cloned existing gh-pages branch"
                cd gh-pages
              else
                echo "📝 Creating new gh-pages branch"
                mkdir gh-pages
                cd gh-pages
                git init
                git checkout -b gh-pages
                git remote add origin https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git
              fi
              
              # Configure git
              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              
              # Create directory structure and copy image
              mkdir -p $(dirname "$IMAGE_PATH")
              cp ${{ github.workspace }}/comparison_200_tokens.png "$IMAGE_PATH"
              
              # Add and commit
              git add "$IMAGE_PATH"
              git commit -m "Add telemetry visualization for PR #${{ github.event.pull_request.number }} (run: ${{ github.run_id }})"
              
              # Push to gh-pages
              git push origin gh-pages
              
              # Return to main directory
              cd ${{ github.workspace }}
              
              # Use GitHub Pages URL (now that it's enabled)
              VISUALIZATION_URL="https://eumemic.github.io/dynamic-summary/$IMAGE_PATH"
              echo "VISUALIZATION_URL=$VISUALIZATION_URL" >> $GITHUB_OUTPUT
              echo "📸 Image published to GitHub Pages: $VISUALIZATION_URL"
            fi
          else
            echo "⚠️ Skipping visualization - missing telemetry_200_tokens.json files"
          fi
      
      - name: Update comment - visualization complete
        uses: actions/github-script@v7
        with:
          script: |
            const identifier = '<!-- github-actions-perf-report-comment -->';
            const workflowUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            
            const body = `${identifier}
            ## 📊 Performance Report
            
            _View [workflow run](${workflowUrl})_
            
            ⏳ **Progress:**
            - ✅ 100 tokens benchmark complete
            - ✅ 200 tokens benchmark complete
            - ✅ 400 tokens benchmark complete
            - ✅ Visualization generated
            - ⏱️ Generating comparison report...`;
            
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            
            const botComment = comments.find(comment => 
              comment.body && comment.body.includes(identifier) &&
              comment.user && comment.user.login === 'github-actions[bot]'
            );
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body
              });
            }
      
      - name: Compare results
        id: compare
        run: |
          set +e  # Don't exit on error, we handle exit codes manually
          # Check if we have baseline results
          if [ ! -d "baseline_results" ] || [ ! -f "baseline_results/telemetry_100_tokens.json" ]; then
            echo "## 📊 Performance Report" > report.md
            echo "" >> report.md
            echo "_View [workflow run]($GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID)_" >> report.md
            echo "" >> report.md
            echo "⚠️ No baseline benchmarks available." >> report.md
            echo "" >> report.md
            echo "This is the first PR with performance benchmarks. Future PRs will compare against these results." >> report.md
            echo "" >> report.md
            echo "### Current Performance" >> report.md
            echo "" >> report.md
            
            # Show current results
            for file in benchmark_results/telemetry_*_tokens.json; do
              if [ -f "$file" ]; then
                chunk_size=$(basename "$file" | sed 's/telemetry_\([0-9]*\)_tokens.json/\1/')
                echo "**Chunk size: $chunk_size tokens**" >> report.md
                # Check if file contains error
                if grep -q '"error"' "$file"; then
                  echo "- ❌ Benchmark failed to run" >> report.md
                else
                  python3 -c "import json; from ragzoom.config import RagZoomConfig; from ragzoom.telemetry_analysis import compute_metrics_from_telemetry; data = json.load(open('$file')); config = RagZoomConfig(openai_api_key='dummy', embedding_cost_per_1k=0.0001, summary_input_cost_per_1k=0.0025, summary_output_cost_per_1k=0.01); metrics = compute_metrics_from_telemetry(data['telemetry'], config); print(f'- Duration: {metrics.total_duration_seconds:.2f}s'); print(f'- Total cost: \${metrics.total_cost:.4f}'); print(f'- Document size: {metrics.source_document_tokens:,} tokens')" >> report.md
                fi
                echo "" >> report.md
              fi
            done
          else
            # Generate comparison report using ragzoom-telemetry
            echo "🔍 Checking for baseline and current benchmark files..."
            ls -la baseline_results/ || echo "No baseline_results directory"
            ls -la benchmark_results/ || echo "No benchmark_results directory"
            
            # Test ragzoom-telemetry installation
            echo "🧪 Testing ragzoom-telemetry installation..."
            ragzoom-telemetry --help > /dev/null || {
              echo "❌ ragzoom-telemetry command not found or failed" > report.md
              echo "REGRESSION=true" >> $GITHUB_OUTPUT
              exit 1
            }
            
            # Test Python imports
            echo "🐍 Testing Python imports..."
            python -c "from ragzoom.telemetry_analysis import compute_simplified_metrics; print('✅ ragzoom imports OK')" || {
              echo "❌ Failed to import ragzoom.telemetry module" > report.md
              echo "Check that ragzoom package was installed correctly before ragzoom-telemetry" >> report.md
              echo "REGRESSION=true" >> $GITHUB_OUTPUT
              exit 1
            }
            
            # Compare benchmarks
            # Check if we have multiple baseline files for directory comparison
            baseline_count=$(ls baseline_results/telemetry_*_tokens.json 2>/dev/null | wc -l)
            
            if [ "$baseline_count" -gt 1 ]; then
              # New style: directory comparison for multiple chunk sizes
              echo "📊 Running multi-file benchmark comparison..."
              # Run comparison and capture both output and exit code
              # Use set +e to prevent immediate exit on error
              set +e
              ragzoom-telemetry compare baseline_results/ benchmark_results/ --output markdown > report.md 2>&1
              comparison_exit_code=$?
              set -e
              
              # Report is ready as-is, no need to add visualization (handled in PR comment)
            elif [ -f "baseline_results/telemetry_100_tokens.json" ] && [ -f "benchmark_results/telemetry_100_tokens.json" ]; then
              # TODO: Remove this single-file fallback after migration period
              # Once all baselines in master are multi-file, we can remove this branch
              echo "📊 Running single-file benchmark comparison (legacy mode)..."
              # Run comparison and capture both output and exit code
              set +e
              ragzoom-telemetry compare baseline_results/telemetry_100_tokens.json benchmark_results/telemetry_100_tokens.json --output markdown > report.md 2>&1
              comparison_exit_code=$?
              set -e
              
              # Report is ready as-is, no need to add visualization (handled in PR comment)
            else
              echo "❌ Expected benchmark files not found" > report.md
              echo "" >> report.md
              echo "Looking for:" >> report.md
              echo "- baseline_results/telemetry_*_tokens.json" >> report.md  
              echo "- benchmark_results/telemetry_*_tokens.json" >> report.md
              echo "" >> report.md
              comparison_exit_code=1
            fi
            
            if [ $comparison_exit_code -ne 0 ]; then
              echo "REGRESSION=true" >> $GITHUB_OUTPUT
              # The compare command already wrote the complete report to report.md
              # No need to append debug information
            fi
          fi
          
          # Save report for comment
          if [ -f report.md ]; then
            cat report.md >> $GITHUB_STEP_SUMMARY
            
            # Also save as output for PR comment
            # GitHub Actions requires a unique delimiter for multi-line outputs
            # to prevent injection attacks. Using openssl is the recommended approach.
            delimiter="$(openssl rand -hex 16)"
            {
              echo "report<<${delimiter}"
              cat report.md
              echo ""  # Ensure newline before delimiter
              echo "${delimiter}"
            } >> $GITHUB_OUTPUT
          fi
          
          # Exit with success - regression detection is handled by separate step
          exit 0
      
      - name: Update PR comment with final results
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const identifier = '<!-- github-actions-perf-report-comment -->';
            const workflowUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const report = `${{ steps.compare.outputs.report }}`;
            const visualizationUrl = `${{ steps.visualize.outputs.VISUALIZATION_URL }}`;
            
            // Build final comment body
            let body = `${identifier}\n## 📊 Performance Report\n\n`;
            body += `_View [workflow run](${workflowUrl})_\n\n`;
            
            // Add visualization if it was generated
            if (visualizationUrl) {
              body += `### Performance Visualization (200 tokens)\n\n`;
              body += `![Telemetry Comparison](${visualizationUrl})\n\n`;
            }
            
            // Add the comparison report or error message
            if (report) {
              body += report;
            } else {
              body += '❌ **Performance benchmarks failed to run**\n\n';
              body += 'Check the [workflow logs](' + workflowUrl + ') for details.';
            }
            
            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            
            const botComment = comments.find(comment => 
              comment.body && comment.body.includes(identifier) &&
              comment.user && comment.user.login === 'github-actions[bot]'
            );
            
            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body
              });
              console.log(`Updated comment with final results: ${botComment.id}`);
            } else {
              // Create new comment if somehow the initial one wasn't created
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }
      
      - name: Fail if regression detected
        if: steps.compare.outputs.REGRESSION == 'true'
        run: |
          echo "❌ Performance regression detected!"
          exit 1
      
      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results
          path: |
            baseline_results/
            benchmark_results/
            report.md
            comparison_200_tokens.png
